<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LaunchPilot AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            background-color: #0a0a0a;
            color: #f0f0f0;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
        }

        .navbar {
            background-color: #0a0a0a;
            border-bottom: 1px solid #1f1f1f;
            padding: 1rem 2rem;
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 1.3rem;
            color: #a78bfa !important;
            letter-spacing: -0.02em;
        }

        .nav-link {
            color: #666 !important;
            font-size: 0.9rem;
            transition: color 0.2s;
        }

        .nav-link:hover {
            color: #f0f0f0 !important;
        }

        .card-dark {
            background: #111;
            border: 1px solid #1f1f1f;
            border-radius: 16px;
            padding: 1.5rem;
            transition: border-color 0.2s;
        }

        .card-dark:hover {
            border-color: #333;
        }

        .badge-purple {
            background: #1e1b4b;
            color: #a78bfa;
            padding: 4px 12px;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .badge-green {
            background: #052e16;
            color: #4ade80;
            padding: 4px 12px;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .badge-gray {
            background: #1a1a1a;
            color: #666;
            padding: 4px 12px;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 500;
            border: 1px solid #2a2a2a;
        }

        .btn-primary-custom {
            background: #7c3aed;
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            padding: 14px 24px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            width: 100%;
        }

        .btn-primary-custom:hover {
            background: #6d28d9;
        }

        .btn-primary-custom:active {
            transform: scale(0.98);
        }

        textarea,
        select {
            background: #0a0a0a !important;
            border: 1px solid #2a2a2a !important;
            border-radius: 10px !important;
            color: #f0f0f0 !important;
            font-size: 0.95rem !important;
            padding: 12px 14px !important;
            width: 100%;
            outline: none !important;
            transition: border-color 0.2s;
        }

        textarea:focus,
        select:focus {
            border-color: #7c3aed !important;
        }

        select option {
            background: #111;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #0a0a0a;
        }

        ::-webkit-scrollbar-thumb {
            background: #2a2a2a;
            border-radius: 3px;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg">
        <a class="navbar-brand" href="/">⚡ LaunchPilot AI</a>
        <div style="margin-left: auto; display: flex; gap: 1.5rem; align-items: center;">
            <a href="/history/" class="nav-link">History</a>
            <a href="/"
                style="background: #7c3aed; color: #fff; padding: 8px 16px; border-radius: 8px; text-decoration: none; font-size: 0.85rem; font-weight: 600;">
                + New
            </a>
        </div>
    </nav>

    {% block content %}{% endblock %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
